<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試日文練習室</title>
    <style>
        :root {
            --primary-color: #81A3A7;
            --primary-light: #C2D3DA;
            --accent-color: #585A56;
            --bg-color: #F1F3F2;
            --text-main: #272424;
            --save-color: #E3D081;
            --danger-color: #C78B8B;
        }
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            color: var(--text-main); 
            line-height: 1.6;
        }
        
        /* 統一區塊寬度 */
        .card, .my-list-section, .brand-footer, .brand-header {
            width: 100%;
            max-width: 500px;
        }

        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-name { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); }
        
        /* 新增的副標題樣式 */
        .brand-sub { font-size: 0.8rem; color: #888; margin-top: 5px; }
        .brand-sub a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
        .brand-sub a:hover { text-decoration: underline; }

        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .word-header { display: flex; gap: 12px; align-items: center; }
        
        .word { font-size: 2.2rem; color: var(--primary-color); margin: 15px 0 5px 0; font-weight: bold; }
        .reading { font-size: 1.2rem; color: var(--primary-color); margin-bottom: 15px; font-weight: bold; opacity: 0.8; }
        
        .phonetic, .save-btn { flex: 1; padding: 8px 18px; border-radius: 50px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .phonetic { background: #f0f0f0; color: #333; }
        .save-btn { background: var(--save-color); color: #333; border: 1px solid transparent; }
        .saved { background: var(--danger-color); color: white; }

        .meaning { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--accent-color); border-bottom: 2px solid var(--bg-color); padding-bottom: 5px; }
        .examples { background: #fdfcfb; padding: 18px; border-left: 4px solid var(--accent-color); border-radius: 8px; }
        
        .next-btn { width: 100%; margin-top: 25px; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* 單字本區塊 */
        .my-list-section { background: white; border: 2px solid var(--primary-color); border-radius: 20px; padding: 12px; margin-top: 20px; }
        .collapse-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 10px; }
        .collapse-header h3 { color: var(--text-main); margin: 0; }
        #arrow { color: var(--primary-color); }
        
        .collapse-content { display: none; margin-top: 10px; }
        #myVocabularyList { list-style: none; padding: 0; }
        #myVocabularyList li { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* Footer */
        .brand-footer { background: white; border-radius: 20px; padding: 25px; margin-top: 25px; text-align: center; border: 1px solid #eee; }

/* 新的空心邊框按鈕樣式 */
        .outline-button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: transparent;          /* 透明底色 */
            color: var(--accent-color);       /* 文字顏色 */
            text-decoration: none;
            border: 2px solid var(--accent-color); /* 設定框線 */
            border-radius: 50px;              /* 圓角設計 */
            font-weight: bold;
            transition: 0.3s;
        }

        /* 滑鼠移上去的效果 */
        .outline-button:hover {
            background: var(--accent-color);
            color: white;
        }

    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-name">面試日文練習室</div>
    <div class="brand-sub">
        隨機面試單字與例句練習 | 
        <a href="https://www.instagram.com/ellynihonnow" target="_blank">by ellynihonnow</a>
    </div>
</div>

<div class="card">
    <div class="word-header">
        <button class="phonetic" onclick="speak()">🔊 發音</button>
        <button id="saveBtn" class="save-btn" onclick="toggleSave()">⭐ 加入單字本</button>
    </div>
    <div class="word" id="currentWord">載入中...</div>
    <div class="reading" id="currentReading"></div>
    <div class="meaning" id="currentMeaning"></div>
    <div class="examples" id="exampleList"></div>
    <button class="next-btn" onclick="getRandomWord()">下一個面試單字</button>
</div>

<div class="my-list-section">
    <div class="collapse-header" onclick="toggleCollapse()">
        <h3>單字本 (<span id="count">0</span>)</h3>
        <span id="arrow">▼ 展開</span>
    </div>
    <div id="collapseContent" class="collapse-content">
        <ul id="myVocabularyList"></ul>
    </div>
</div>

<div class="brand-footer">
    <div class="footer-bio">給正在準備日本面試的人。陪你熟悉面試裡的語感與表達。</div>
    <a href="https://ellynihonnow-job.my.canva.site/" target="_blank" class="outline-button">日本HR的就職觀察筆記空間</a>
</div>

JavaScript
<script>
    let currentWordObj = null;
    let savedWords = JSON.parse(localStorage.getItem('myVocab')) || [];
    
    // 您的單字庫
    const wordBank = [
        { word: "自己紹介", reading: "じこしょうかい", meaning: "自我介紹", examples: [ "自己紹介をさせていただきます。"] },
        { word: "自己PR", reading: "じこぴーあーる", meaning: "自我推薦", examples: ["私の強みは行動力です。"] },
        { word: "志望動機", reading: "しぼうどうき", meaning: "應徵動機", examples: ["貴社の企業理念に共感し、志望いたしました。"] }
    ];

// 使用 Google TTS 的發音功能
    function speak() {
        if (!currentWordObj) return;
        
        // 取得單字或發音提示，並進行網址編碼
        const textToSpeak = currentWordObj.reading || currentWordObj.word;
        
        // Google TTS 請求連結
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ja&client=tw-ob&q=${encodeURIComponent(textToSpeak)}`;
        
        // 播放音訊
        const audio = new Audio(url);
        audio.play();
    }    // 隨機獲取單字
    function getRandomWord() {
        currentWordObj = wordBank[Math.floor(Math.random() * wordBank.length)];
        renderWord();
    }

    // 渲染單字頁面
    function renderWord() {
        document.getElementById('currentWord').innerText = currentWordObj.word;
        document.getElementById('currentReading').innerText = currentWordObj.reading;
        document.getElementById('currentMeaning').innerText = currentWordObj.meaning;
        document.getElementById('exampleList').innerHTML = currentWordObj.examples.map(ex => `<div class="example-item">${ex}</div>`).join('');
        updateSaveBtnUI();
    }

    // 切換收藏狀態
    function toggleSave() {
        const index = savedWords.findIndex(item => item.word === currentWordObj.word);
        if (index > -1) {
            savedWords.splice(index, 1);
        } else {
            savedWords.push(currentWordObj);
        }
        localStorage.setItem('myVocab', JSON.stringify(savedWords));
        updateSaveBtnUI();
        renderSavedList();
    }

    // 更新收藏按鈕樣式
    function updateSaveBtnUI() {
        const btn = document.getElementById('saveBtn');
        const isSaved = savedWords.some(item => item.word === currentWordObj.word);
        btn.innerText = isSaved ? "❤️已在單字本" : "⭐加入單字本";
        btn.className = isSaved ? "save-btn saved" : "save-btn";
    }

    // 渲染已收藏列表
    function renderSavedList() {
        const listEl = document.getElementById('myVocabularyList');
        document.getElementById('count').innerText = savedWords.length;
        listEl.innerHTML = savedWords.map((item, idx) => `
            <li>
                <div style="flex-grow:1; cursor:pointer;" onclick="loadReviewWord('${item.word}')">
                    <strong>${item.word}</strong><br>
                    <small>${item.meaning}</small>
                </div>
                <button class="remove-btn" onclick="removeSaved(${idx})">移除</button>
            </li>
        `).join('');
    }

    // 點擊列表中的單字進行複習
    window.loadReviewWord = function(wordText) {
        const found = wordBank.find(item => item.word === wordText);
        if (found) {
            currentWordObj = found;
            renderWord();
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 自動捲動到上方
        }
    }

    // 移除單字
    window.removeSaved = function(idx) {
        savedWords.splice(idx, 1);
        localStorage.setItem('myVocab', JSON.stringify(savedWords));
        updateSaveBtnUI();
        renderSavedList();
    }

    // 摺疊功能
    function toggleCollapse() {
        const content = document.getElementById('collapseContent');
        const arrow = document.getElementById('arrow');
        const isHidden = content.style.display === "none" || content.style.display === "";
        content.style.display = isHidden ? "block" : "none";
        arrow.innerText = isHidden ? "▲ 收起清單" : "▼ 展開複習";
    }

    // 初始化
    getRandomWord();
    renderSavedList();
</script>
</body>
</html>
