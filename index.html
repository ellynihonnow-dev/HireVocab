    <style>

            --danger-color: #ff4757;
        }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        
        .brand-header { width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; }
        .brand-name { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); letter-spacing: 1px; }
        .brand-tagline { font-size: 0.85rem; color: #666; margin-top: 5px; }

        .word { font-size: 2.2rem; color: var(--primary-color); margin: 15px 0; font-weight: bold; }
        .phonetic { color: #333; cursor: pointer; font-size: 0.95rem; background: #f0f0f0; padding: 8px 18px; border-radius: 50px; border: 1px solid #ddd; font-weight: bold; transition: 0.2s; }
        .phonetic:hover { background: #e8e8e8; transform: translateY(-2px); }
        .meaning { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--accent-color); border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .examples { background: #fdfcfb; padding: 18px; border-left: 4px solid var(--accent-color); border-radius: 8px; margin-top: 10px; }
        .example-item { margin-bottom: 12px; font-size: 0.95rem; line-height: 1.6; color: #555; } /* 移除 cursor:pointer */
        
        .btns { margin-top: 25px; display: flex; gap: 12px; }

        .next-btn { background: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(109, 158, 235, 0.3); }
        .save-btn { background: var(--save-color); color: #333; }

<style>
    /* 修正全域框框邏輯 */
    * { box-sizing: border-box; }

    /* 統一所有區塊的最大寬度 */
    .card, .my-list-section, .brand-footer {

</style>

        const utterance = new SpeechSynthesisUtterance(targetText);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);

        { word: "製品 (せいひん)", meaning: "產品/製品", examples: ["貴社の製品の品質の高さに感銘を受けました。(對貴社產品的高品質感到感銘。)"] },
        { word: "商品 (しょうひん)", meaning: "商品", examples: ["新商品の魅力をより多くの方に伝えたいです。(想將新商品的魅力傳達給更多人。)"] },
        { word: "業界トップ (ぎょうかいとっぷ)", meaning: "業界龍頭", examples: ["業界トップを走り続ける姿勢に共感します。(感同持續跑在業界龍頭的態度。)"] },

        { word: "持続可能性 (じぞくかのうせい)", meaning: "永續性", examples: ["持続可能性を追求する姿勢を尊敬します。(尊敬追求永續性的態度。)"] },
        { word: "福利厚生 (ふくりこうせい)", meaning: "福利制度", examples: ["福利厚生が充実しており、長く働ける環境です。(福利充實是能長久工作的環境。)"] },
        { word: "研修制度 (けんしゅうせいど)", meaning: "研修制度", examples: ["研修制度を通じて、スキルを磨きたいです。(想透過研修制度磨練技能。)"] },
        { word: "バリュー (ばりゅー)", meaning: "價值觀", examples: ["貴社のバリューに基づいた行動を実践します。(實踐基於貴社價值觀的行動。)"] },
        { word: "創業 (そうぎょう)", meaning: "創業/創立", examples: ["創業以来の歴史を大切にする姿勢に惹かれました。(被重視創業以來歷史的態度吸引。)"] },
        { word: "展開 (てんかい)", meaning: "發展/展開", examples: ["新規市場への展開に携わりたいです。(想參與新市場的開拓發展。)"] },
        { word: "活かす (いかす)", meaning: "活用/發揮", examples: ["自己的強みを最大限に活かせる環境です。(是能最大限度發揮強項的環境。)"] },
        { word: "習得する (しゅう特する)", meaning: "習得/學會", examples: ["新しい技術を速やかに習得いたします。(會迅速習得新技術。)"] },
        { word: "やりがい (やりがい)", meaning: "成就感/價值", examples: ["お客様の笑顔が、私にとってのやりがいです。(客戶的笑容是我的成就感來源。)"] },
        { word: "検討する (けんとうする)", meaning: "討論/研討", examples: ["具体的になぜそうなるか、改めて検討します。(會具體針對為何如此進行研討。)"] },
        { word: "努める (つとめる)", meaning: "努力/致力於", examples: ["迅速かつ丁寧な対応に努めます。(致力於迅速且禮貌的對應。)"] },
        { word: "努力する (どりょくする)", meaning: "努力", examples: ["目標達成のため、地道な努力を惜しみません。(為了目標不惜付出踏實努力。)"] },
        { word: "実現する (じつげんする)", meaning: "實現", examples: ["貴社で自分のビジョンを実現したいです。(想在貴社實現自己的願景。)"] },
        { word: "共感する (きょうかんする)", meaning: "共鳴/認同", examples: ["貴社の理念に深く共感し、応募しました。(深感貴社理念共鳴因此應徵。)"] },
        { word: "学ぶ (まなぶ)", meaning: "學習", examples: ["失敗を恐れず、常に現場から学びます。(不畏失敗隨時從現場學習。)"] },
        { word: "発揮する (はっきする)", meaning: "發揮", examples: ["これまでの経験を存分に発揮したいです。(想充分發揮至今為止的經驗。)"] },
        { word: "成長する (せいちょうする)", meaning: "成長", examples: ["会社とともに成長できる人材でありたいです。(想成為能與公司一同成長的人才。)"] },
        { word: "具体的に (ぐたいてきに)", meaning: "具體地", examples: ["具体的にどのような貢献ができるか話します。(說明能具體做出什麼貢獻。)"] },
        { word: "結論 (けつろん)", meaning: "結論", examples: ["結論から申し上げますと、理由は三点です。(從結論說起理由有三點。)"] },
        { word: "申し上げます (もうしあげます)", meaning: "告知/說(謙讓)", examples: ["心より御礼申し上げます。(由衷表示感謝。)"] },
        { word: "したがって (したがって)", meaning: "因此", examples: ["したがって、私は貴社を志望いたします。(因此，我應徵貴公司。)"] },
        { word: "加えて (くわえて)", meaning: "加上/此外", examples: ["経験に加え、語學力も私の武器です。(除了經驗外，語言力也是武器。)"] },
        { word: "一方で (いっぽうで)", meaning: "另一方面", examples: ["一方で、慎重になりすぎる面もあります。(另一方面，也有過於慎重的一面。)"] },
        { word: "最後に (さいごに)", meaning: "最後", examples: ["最後に、一言お伝えしたいことがございます。(最後，有一句話想告訴各位。)"] },
        { word: "挑戦したい (ちょうせんしたい)", meaning: "想要挑戰", examples: ["新しい分野にぜひ挑戰したいです。(請務必讓我挑戰新領域。)"] },
        { word: "お願いします (おねがいします)", meaning: "拜託了", examples: ["よろしくお願いいたします。(請多指教/拜託了。)"] },
        { word: "ありがとうございます (ありがとうございます)", meaning: "謝謝", examples: ["本日はお時間をいただきありがとうございます。(感謝您今日撥冗。)"] },
        { word: "お時間 (おじかん)", meaning: "您的時間(敬語)", examples: ["貴重なお時間をいただき感謝いたします。(感謝您撥出寶貴的時間。)"] },
        { word: "コミュニケーション (こみゅにけーしょん)", meaning: "溝通", examples: ["圓滑なコミュニケーションを心がけています。(留意要進行圓滑的溝通。)"] },
        { word: "逆質問 (ぎゃくしつもん)", meaning: "反向提問", examples: ["逆質問で意欲をアピールします。(透過反向提問宣傳積極性。)"] },
        { word: "キャリアパス (きゃりあぱす)", meaning: "職涯路徑", examples: ["將來的なキャリアパスを教えてください。(請告訴我未來的職涯發展。)"] },
        { word: "パフォーマンス (ぱふぉーまんす)", meaning: "表現/績效", examples: ["早期に高いパフォーマンスを発揮します。(早期發揮高度表現績效。)"] }
    ];

    function getRandomWord() {
        const randomIndex = Math.floor(Math.random() * wordBank.length);
        currentWordObj = wordBank[randomIndex];
        renderWord();
    }

    window.loadReviewWord = function(wordText) {
        const found = wordBank.find(item => item.word === wordText);
        if (found) {
            currentWordObj = found;
            renderWord();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function renderWord() {
        document.getElementById('currentWord').innerText = currentWordObj.word;
        document.getElementById('currentMeaning').innerText = currentWordObj.meaning;
        const list = document.getElementById('exampleList');
        list.innerHTML = currentWordObj.examples.map(ex => `<div class="example-item">${ex}</div>`).join('');
        updateSaveBtnUI();
        renderSavedList();
    }

    function toggleSave() {
        const index = savedWords.findIndex(item => item.word === currentWordObj.word);
        if (index > -1) {
            savedWords.splice(index, 1);
        } else {
            savedWords.push(currentWordObj);
        }
        localStorage.setItem('myVocab', JSON.stringify(savedWords));
        updateSaveBtnUI();
        renderSavedList();
    }

    function updateSaveBtnUI() {
        const btn = document.getElementById('saveBtn');
        const isSaved = savedWords.some(item => item.word === currentWordObj.word);
        btn.innerText = isSaved ? "❤️已在單字本" : "⭐加入單字本";
        btn.className = isSaved ? "save-btn saved" : "save-btn";
    }

    function renderSavedList() {
        const listEl = document.getElementById('myVocabularyList');
        document.getElementById('count').innerText = savedWords.length;
        listEl.innerHTML = savedWords.map((item, idx) => `
            <li>
                <div style="flex-grow:1; cursor:pointer;" onclick="loadReviewWord('${item.word}')">
                    <strong>${item.word}</strong><br>
                    <small>${item.meaning}</small>
                </div>
                <button class="remove-btn" onclick="removeSaved(${idx})">移除</button>
            </li>
        `).join('');
    }

    window.removeSaved = function(idx) {
        savedWords.splice(idx, 1);
        localStorage.setItem('myVocab', JSON.stringify(savedWords));
        updateSaveBtnUI();
        renderSavedList();
    }

    function toggleCollapse() {
        const content = document.getElementById('collapseContent');
        const arrow = document.getElementById('arrow');
        if (content.style.display === "block") {
            content.style.display = "none";
            arrow.innerText = "▼ 展開複習";
        } else {
            content.style.display = "block";
            arrow.innerText = "▲ 收起清單";
        }
    }

    getRandomWord();
</script>
</body>
</html>
